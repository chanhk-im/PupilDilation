spring:
  profiles:
    active: dev  # 기본값. 배포 시 prod로 오버라이드

  application:
    name: reservation-service

  jpa:
    open-in-view: false          # OSIV 끄기 (API 서버엔 안티패턴)
    properties:
      hibernate:
        default_batch_fetch_size: 100   # N+1 방지 IN 절 배치

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

jwt:
  secret: ${JWT_SECRET}          # 환경변수 필수
  access-expiration: 3600000     # 1시간 (ms)
  refresh-expiration: 1209600000 # 14일 (ms)

reservation:
  timeout-minutes: 15            # 결제 미완료 타임아웃

toss:
  secret-key: ${TOSS_SECRET_KEY}
  base-url: https://api.tosspayments.com/v1

scheduler:
  recover-delay: 60000           # 1분마다 타임아웃 좌석 복구