spring:
  datasource:
    url: jdbc:mysql://localhost:3306/pupildilation_dev?serverTimezone=Asia/Seoul&characterEncoding=UTF-8
    username: root
    password: 1234
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update            # 로컬은 update로 편하게
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  data:
    redis:
      host: localhost
      port: 6379
      # password 없음 (로컬 Redis)

logging:
  level:
    com.chanhk.pupildilation: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.orm.jdbc.bind: TRACE  # 바인딩 파라미터 출력

# Mock 결제 사용 (토스 연동 X)
payment:
  mode: mock